spring.application.name=backend
server.port=${PORT:8098}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/muscle_focus_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:muscle_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:muscle_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Settings
# Default secret key (should be overridden in production)
musclefocus.jwt.secret=${JWT_SECRET:9a67471ec6391443d4ec7ad9e5f1f8bda70891d4e4141d8e18371302b18aa2f8}
# 24 hours in milliseconds
musclefocus.jwt.expiration-ms=86400000

# Default Admin Configuration (Ali should override this in production environment variables)
musclefocus.admin.username=${ADMIN_USERNAME:admin}
musclefocus.admin.password=${ADMIN_PASSWORD:admin123}

# Stripe Configuration
# stripe.api.key=${STRIPE_API_KEY:}
# Google Apps Script Web App URL for Email Notifications
google.script.url=${GOOGLE_SCRIPT_URL:https://script.google.com/macros/s/AKfycbzB_p1jiJXc6mUWBzMGiO9JxYj1ewxETipTp74612IQfi021cKjkmFDykTh619ek0ejxA/exec}
# Frontend Redirect Base URL
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

